#!
##! AZERTY Optimizations
# Optimisations pour clavier AZERTY français
# Généré automatiquement le 2026-01-12

# Désactivation des raccourcis problématiques sur AZERTY
unbind = Super, Semicolon       # Semicolon = Shift+, sur AZERTY (peu pratique)
unbind = Super, Apostrophe      # Apostrophe = touche 4 sur AZERTY (peu pratique)
unbind = Super, BracketLeft     # [ = AltGr+( sur AZERTY (redondant avec flèches)
unbind = Super, BracketRight    # ] = AltGr+) sur AZERTY (redondant avec flèches)
unbind = Ctrl+Super, BracketLeft   # Redondant avec Ctrl+Super+Left
unbind = Ctrl+Super, BracketRight  # Redondant avec Ctrl+Super+Right
unbind = Super, Slash           # Slash = Shift+: sur AZERTY (peu pratique)

# Ajustement du ratio de split des fenêtres (optimisé AZERTY)
binde = Super+Ctrl, Comma, splitratio, -0.1  # Réduire le ratio de split
binde = Super+Ctrl, Period, splitratio, +0.1 # Augmenter le ratio de split

# Cheatsheet plus accessible sur AZERTY
bindd = Super, H, Toggle cheatsheet, global, quickshell:cheatsheetToggle # Afficher l'aide (H = Help)
bind = Super, H, exec, qs -c $qsConfig ipc call TEST_ALIVE || notify-send "Cheatsheet" "Super+H pour afficher l'aide" -a 'Hyprland' # [hidden] Fallback cheatsheet

